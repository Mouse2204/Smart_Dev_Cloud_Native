# ====================================================================
# Smart Dev-Docs Platform - Kubernetes Infrastructure Manifest
# ====================================================================

---
# ====================================================================
# NAMESPACES
# ====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: kafka-kraft
---
apiVersion: v1
kind: Namespace
metadata:
  name: postgres
---
apiVersion: v1
kind: Namespace
metadata:
  name: hive
---
apiVersion: v1
kind: Namespace
metadata:
  name: spark
---
apiVersion: v1
kind: Namespace
metadata:
  name: ollama
---
apiVersion: v1
kind: Namespace
metadata:
  name: qdrant
---
apiVersion: v1
kind: Namespace
metadata:
  name: minio

---
# ====================================================================
# STORAGECLASS (Minikube)
# ====================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard
provisioner: k8s.io/minikube-hostpath
reclaimPolicy: Delete
volumeBindingMode: Immediate

---
# ====================================================================
# KAFKA (Kraft mode)
# ====================================================================
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: kafka-kraft
  labels:
    app: kafka
spec:
  type: ClusterIP
  ports:
    - name: broker
      port: 9092
      protocol: TCP
      targetPort: 9092
    - name: external
      port: 9094
      protocol: TCP
      targetPort: 9094
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka-kraft
spec:
  selector:
    matchLabels:
      app: kafka
  serviceName: kafka-service
  replicas: 1
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - containerPort: 9092
          env:
            - name: CLUSTER_ID
              value: "QwjfU6MPQ_CMdFsbCx7EGg"
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_LISTENERS
              value: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "INTERNAL://kafka-service.kafka-kraft:9092,EXTERNAL://localhost:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "INTERNAL"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_NUM_PARTITIONS
              value: "8"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          volumeMounts:
            - name: kafka-storage
              mountPath: /var/lib/kafka/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: kafka-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi

---
# ====================================================================
# POSTGRESQL
# ====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: postgres
stringData:
  POSTGRES_DB: metastore
  POSTGRES_USER: hive
  POSTGRES_PASSWORD: hivepass
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: postgres
spec:
  storageClassName: standard
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi      # Giảm từ 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres

---
# ====================================================================
# ICEBERG WAREHOUSE PVC
# ====================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iceberg-warehouse-pvc
  namespace: hive
spec:
  storageClassName: standard
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi      # Giảm từ 10Gi

---
# ====================================================================
# HIVE METASTORE (Iceberg Catalog)
# ====================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: metastore-config
  namespace: hive
data:
  metastore-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property>
        <name>metastore.thrift.uris</name>
        <value>thrift://0.0.0.0:9083</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionDriverName</name>
        <value>org.postgresql.Driver</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionURL</name>
        <value>jdbc:postgresql://postgres-service.postgres:5432/metastore</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionUserName</name>
        <value>hive</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionPassword</name>
        <value>hivepass</value>
      </property>
      <property>
        <name>metastore.warehouse.dir</name>
        <value>file:///opt/iceberg/warehouse</value>
      </property>
      <property>
        <name>datanucleus.schema.autoCreateAll</name>
        <value>true</value>
      </property>
      <property>
        <name>hive.metastore.schema.verification</name>
        <value>false</value>
      </property>
    </configuration>
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hive-schema-init
  namespace: hive
spec:
  template:
    spec:
      initContainers:
      - name: wait-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres-service.postgres 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done; sleep 5']
      containers:
      - name: schematool
        image: alexcpn/hivemetastore:3.1.3.5
        command:
          - /bin/sh
          - -c
          - |
            echo "Initializing Hive schema on PostgreSQL..."
            # Tìm đường dẫn schematool
            SCHEMATOOL_PATH=$(find / -name schematool -type f 2>/dev/null | head -1)
            if [ -n "$SCHEMATOOL_PATH" ]; then
              echo "Found schematool at: $SCHEMATOOL_PATH"
              # Force dùng PostgreSQL connection params
              $SCHEMATOOL_PATH \
                -dbType postgres \
                -initSchema \
                -userName hive \
                -passWord hivepass \
                -url jdbc:postgresql://postgres-service.postgres:5432/metastore \
                -driver org.postgresql.Driver \
                -verbose
            else
              echo "Schematool not found!"
              exit 1
            fi
        volumeMounts:
          - name: config
            mountPath: /opt/hive/conf/metastore-site.xml
            subPath: metastore-site.xml
        env:
          - name: HIVE_CONF_DIR
            value: "/opt/hive/conf"
      restartPolicy: Never
      volumes:
        - name: config
          configMap:
            name: metastore-config
  backoffLimit: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metastore
  namespace: hive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metastore
  template:
    metadata:
      labels:
        app: metastore
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-service.postgres 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done; sleep 5']
        - name: init-warehouse
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /opt/iceberg/warehouse
              chmod 777 /opt/iceberg/warehouse
          volumeMounts:
            - name: warehouse
              mountPath: /opt/iceberg/warehouse
      containers:
        - name: metastore
          image: alexcpn/hivemetastore:3.1.3.5
          command: ["/opt/apache-hive-metastore-3.1.3-bin/bin/start-metastore"]  # Đường dẫn đúng
          ports:
            - containerPort: 9083
          env:
            - name: HADOOP_HEAPSIZE
              value: "512"
            - name: HIVE_CONF_DIR
              value: "/opt/apache-hive-metastore-3.1.3-bin/conf"  # Thay đổi đường dẫn conf
            - name: javax.jdo.option.ConnectionURL
              value: "jdbc:postgresql://postgres-service.postgres:5432/metastore"
            - name: javax.jdo.option.ConnectionDriverName
              value: "org.postgresql.Driver"
            - name: javax.jdo.option.ConnectionUserName
              value: "hive"
            - name: javax.jdo.option.ConnectionPassword
              value: "hivepass"
          volumeMounts:
            - name: config
              mountPath: /opt/apache-hive-metastore-3.1.3-bin/conf/metastore-site.xml  # Thay đổi mount path
              subPath: metastore-site.xml
            - name: warehouse
              mountPath: /opt/iceberg/warehouse
          resources:
            requests:
              memory: "512Mi"
              cpu: "300m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: metastore-config
        - name: warehouse
          persistentVolumeClaim:
            claimName: iceberg-warehouse-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: metastore-service
  namespace: hive
spec:
  ports:
    - port: 9083
      targetPort: 9083
  selector:
    app: metastore
---
# ====================================================================
# OLLAMA 
# ====================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models-pvc
  namespace: ollama
spec:
  storageClassName: standard
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi       # Giảm từ 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.1.44
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: ollama
spec:
  ports:
    - port: 11434
      targetPort: 11434
  selector:
    app: ollama
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-models
  namespace: ollama
spec:
  template:
    spec:
      containers:
      - name: puller
        image: ollama/ollama:0.1.44
        env:
        - name: OLLAMA_HOST
          value: "http://ollama-service:11434"
        command:
          - /bin/sh
          - -c
          - |
            echo "⏳ Waiting for Ollama to be ready..."
            until ollama list &>/dev/null; do
              echo "Ollama not ready, retrying in 5s..."
              sleep 5
            done
            echo "✅ Ollama is ready!"
            
            echo "📥 Pulling nomic-embed-text..."
            ollama pull nomic-embed-text
            
            echo "📥 Pulling mistral:7b-instruct..."
            ollama pull mistral:7b-instruct
            
            echo "✅ All models pulled successfully!"
            ollama list
        volumeMounts:
        - name: models
          mountPath: /root/.ollama
      restartPolicy: Never
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ollama-models-pvc
  backoffLimit: 3

