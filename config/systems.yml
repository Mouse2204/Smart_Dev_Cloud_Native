# ====================================================================
# SPARK STREAMING với ICEBERG
# ====================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-scripts
  namespace: spark
data:
  stream.py: |
    from pyspark.sql import SparkSession
    from pyspark.sql.functions import from_json, col
    from pyspark.sql.types import StructType, StructField, StringType, LongType
    import time

    print("Starting Spark Streaming...")
    time.sleep(10)

    spark = SparkSession.builder \
        .appName("SmartDevDocs-Iceberg") \
        .master("local[1]") \
        .config("spark.sql.extensions", "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions") \
        .config("spark.sql.catalog.hive_prod", "org.apache.iceberg.spark.SparkCatalog") \
        .config("spark.sql.catalog.hive_prod.type", "hive") \
        .config("spark.sql.catalog.hive_prod.uri", "thrift://metastore-service.hive:9083") \
        .config("spark.sql.catalog.hive_prod.warehouse", "file:///opt/iceberg/warehouse") \
        .config("spark.sql.streaming.schemaInference", "true") \
        .config("spark.sql.adaptive.enabled", "false") \
        .getOrCreate()

    spark.sparkContext.setLogLevel("WARN")

    # Create database if not exists
    spark.sql("CREATE DATABASE IF NOT EXISTS hive_prod.db")
    print("Database hive_prod.db created/verified")

    schema = StructType([
        StructField("doc_id", StringType()),
        StructField("chunk_id", StringType()),
        StructField("content", StringType()),
        StructField("timestamp", LongType())
    ])

    df = spark.readStream \
        .format("kafka") \
        .option("kafka.bootstrap.servers", "kafka-service.kafka-kraft:9092") \
        .option("subscribe", "document-events") \
        .option("startingOffsets", "latest") \
        .option("failOnDataLoss", "false") \
        .load()

    parsed = df.select(
        from_json(col("value").cast("string"), schema).alias("data")
    ).select("data.*")

    spark.sql("""
        CREATE TABLE IF NOT EXISTS hive_prod.db.doc_chunks (
            doc_id STRING,
            chunk_id STRING,
            content STRING,
            timestamp LONG
        ) USING iceberg
        LOCATION 'file:///opt/iceberg/warehouse/db/doc_chunks'
    """)

    query = parsed.writeStream \
        .format("iceberg") \
        .outputMode("append") \
        .option("path", "hive_prod.db.doc_chunks") \
        .option("checkpointLocation", "file:///opt/iceberg/warehouse/checkpoints/doc_chunks") \
        .trigger(processingTime="30 seconds") \
        .start()

    print("Streaming is running. Waiting for data...")
    query.awaitTermination()
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iceberg-warehouse-pvc
  namespace: spark
spec:
  storageClassName: standard
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-streaming
  namespace: spark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-streaming
  template:
    metadata:
      labels:
        app: spark-streaming
    spec:
      initContainers:
        - name: wait-kafka
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Kafka at kafka-service.kafka-kraft:9092..."
              while ! nc -z kafka-service.kafka-kraft 9092; do
                echo "Kafka not ready, retrying in 3 seconds..."
                sleep 3
              done
              echo "Kafka is ready! Continuing..."
        - name: wait-metastore
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z metastore-service.hive 9083; do echo "Waiting for Metastore..."; sleep 3; done']
        - name: init-warehouse
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /opt/iceberg/warehouse
              chmod 777 /opt/iceberg/warehouse
          volumeMounts:
            - name: warehouse
              mountPath: /opt/iceberg/warehouse
      containers:
        - name: spark
          image: apache/spark:3.5.7-python3
          ports:
            - containerPort: 4040
          command:
            - /bin/bash
            - -c
            - |
              mkdir -p /tmp/.ivy2
              export SPARK_HOME=/opt/spark
              export IVY_CACHE_DIR=/tmp/.ivy2
              export _JAVA_OPTIONS="-Djava.io.tmpdir=/tmp -Divy.cache.dir=/tmp/.ivy2 -Divy.home=/tmp/.ivy2"
              cd /tmp
              
              echo "Installing dependencies to /tmp/.ivy2..."
              
              $$SPARK_HOME/bin/spark-submit \
                --master local[1] \
                --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.0 \
                --conf spark.ui.enabled=true \
                --conf spark.ui.port=4040 \
                --conf spark.ui.bindAddress=0.0.0.0 \
                --conf spark.driver.bindAddress=0.0.0.0 \
                --conf spark.sql.catalog.hive_prod=org.apache.iceberg.spark.SparkCatalog \
                --conf spark.sql.catalog.hive_prod.type=hive \
                --conf spark.sql.catalog.hive_prod.uri=thrift://metastore-service.hive:9083 \
                --conf spark.sql.catalog.hive_prod.warehouse=/opt/iceberg/warehouse \
                --conf spark.jars.ivy=/tmp/.ivy2 \
                --conf spark.local.dir=/tmp \
                --driver-memory 512m \
                /opt/scripts/stream.py
          volumeMounts:
            - name: scripts
              mountPath: /opt/scripts
            - name: warehouse
              mountPath: /opt/iceberg/warehouse
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "400m"
      volumes:
        - name: scripts
          configMap:
            name: spark-scripts
        - name: warehouse
          persistentVolumeClaim:
            claimName: iceberg-warehouse-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: spark-ui-service
  namespace: spark
spec:
  type: NodePort
  ports:
    - name: ui
      port: 4040
      targetPort: 4040
      nodePort: 30440
  selector:
    app: spark-streaming

